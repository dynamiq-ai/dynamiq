services:
  dynamiq-app:
    image: dynamiq-app:${IMAGE_TAG:-local}
    build:
      target: develop
    volumes:
      - ./:/app

  dynamiq-app-test:
    image: dynamiq-app:${IMAGE_TAG:-local}
    build:
      target: develop
    entrypoint: ["make", "test"]
    env_file:
      - .env
    volumes:
      - ./:/app

  dynamiq-app-test-cov:
    image: dynamiq-app:${IMAGE_TAG:-local}
    build:
      target: develop
    entrypoint: ["make", "test-cov"]
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./reports:/app/reports:wr


  dynamiq-app-test-cov-exclude-integration-with-creds:
    image: dynamiq-app:${IMAGE_TAG:-local}
    build:
      target: develop
    entrypoint: ["make", "test-cov-exclude-integration-with-creds"]
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./reports:/app/reports:wr

  dynamiq-app-test-integration-with-creds:
    image: dynamiq-app:${IMAGE_TAG:-local}
    build:
      target: develop
    entrypoint: ["make", "test-integration-with-creds"]
    env_file:
      - .env
    # Point the KG tests at the local Neo4j service below (no external/Aura credentials needed).
    # These override any NEO4J_* in .env; the graph e2e tests self-skip when NEO4J_URI is unset.
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: testpassword
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./:/app

  # Local Neo4j for the knowledge-graph integration tests. Ephemeral (no volume) so every CI run starts
  # from an empty database; plain Cypher only (no APOC/GDS plugins required by the writer/retriever).
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/testpassword
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p testpassword 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  dynamiq-app-test-smoke:
    image: dynamiq-app:${IMAGE_TAG:-local}
    build:
      target: develop
    entrypoint: ["make", "test-smoke"]
    env_file:
      - .env
    volumes:
      - ./:/app
